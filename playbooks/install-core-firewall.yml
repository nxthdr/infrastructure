# ansible-playbook -i inventory/ --ask-become-pass playbooks/install-core-firewall.yml
---
- hosts: core
  become: yes
  tasks:
  # Docker 27+ inserts raw PREROUTING DROP rules that block all external traffic
  # to container IPs not originating from their own bridge network. This includes
  # cross-bridge container-to-container traffic and externally-routed IPv6 addresses.
  # The fix is to insert ACCEPT rules in raw PREROUTING BEFORE Docker's DROP rules.
  # A systemd service re-applies these rules after Docker daemon restarts.

  - name: Install Docker dmz ip6tables rules script
    ansible.builtin.copy:
      dest: /usr/local/bin/docker-dmz-ip6tables.sh
      mode: '0755'
      content: |
        #!/bin/bash
        # Re-apply ip6tables raw PREROUTING ACCEPT rules for dmz containers.
        # Docker 27+ drops external traffic to container IPs; these rules must
        # appear BEFORE Docker's DROP rules in the PREROUTING chain.
        # Idempotent: checks before inserting.

        set -euo pipefail

        apply_rule() {
            local dest="$1"
            local proto="$2"
            local dport="$3"

            if ! ip6tables -t raw -C PREROUTING -d "$dest" -p "$proto" --dport "$dport" -j ACCEPT 2>/dev/null; then
                ip6tables -t raw -I PREROUTING 1 -d "$dest" -p "$proto" --dport "$dport" -j ACCEPT
            fi
        }

        # proxy (cafe:100::a): HTTP and HTTPS
        apply_rule 2a06:de00:50:cafe:100::a tcp 80
        apply_rule 2a06:de00:50:cafe:100::a tcp 443

        # redpanda/Kafka (cafe:100::b): Kafka broker
        apply_rule 2a06:de00:50:cafe:100::b tcp 9092

        # risotto BMP collector (cafe:100::c): BMP protocol
        apply_rule 2a06:de00:50:cafe:100::c tcp 4000

        # pesto sFlow collector (cafe:100::d): sFlow
        apply_rule 2a06:de00:50:cafe:100::d udp 6343

        # routinator RPKI validator (cafe:100::e): RTR and HTTP
        apply_rule 2a06:de00:50:cafe:100::e tcp 3323
        apply_rule 2a06:de00:50:cafe:100::e tcp 8323

  - name: Install Docker dmz ip6tables systemd service
    ansible.builtin.copy:
      dest: /etc/systemd/system/docker-dmz-ip6tables.service
      mode: '0644'
      content: |
        [Unit]
        Description=Apply ip6tables raw PREROUTING rules for Docker dmz containers
        Documentation=https://github.com/nxthdr/infrastructure
        After=docker.service
        Requires=docker.service
        PartOf=docker.service

        [Service]
        Type=oneshot
        ExecStart=/usr/local/bin/docker-dmz-ip6tables.sh
        RemainAfterExit=yes

        [Install]
        WantedBy=docker.service

  - name: Reload systemd daemon
    ansible.builtin.systemd:
      daemon_reload: yes

  - name: Enable and start docker-dmz-ip6tables service
    ansible.builtin.systemd:
      name: docker-dmz-ip6tables.service
      enabled: yes
      state: started
