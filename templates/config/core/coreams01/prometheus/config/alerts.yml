groups:
- name: recording-rules
  interval: 30s
  rules:
  # Record all instances that have reported metrics in the last 5 minutes
  # This creates a baseline of "known" instances
  - record: instance:up:last_seen
    expr: |
      max_over_time(up[5m]) or on() vector(0)

- name: core-service-down
  rules:
  - alert: Core_Service_Proxy_Down
    expr: up{job="proxy"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down in {{ $labels.instance }}'

  - alert: Core_Service_Redpanda_Down
    expr: up{job="redpanda"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

  - alert: Core_Service_Clickhouse_Down
    expr: up{job="clickhouse"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

  - alert: Core_Service_Chproxy_Down
    expr: up{job="chproxy"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

  - alert: Core_Service_Loki_Down
    expr: up{job="loki"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

  - alert: Core_Service_Grafana_Down
    expr: up{job="grafana"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

  - alert: Core_Service_Risotto_Down
    expr: up{job="risotto"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

  - alert: Core_Service_Pesto_Down
    expr: up{job="pesto"} == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'core service {{ $labels.job }} is down'

- name: host
  rules:
  - alert: Host_Disk_Full
    expr: node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"} * 100 < 10
    for: 1m
    labels:
      severity: warning
    annotations:
      title: host disk is almost full in {{ $labels.instance }}

  - alert: Host_Out_Of_Memory
    expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes * 100 < 10
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: host almost out of memory in {{ $labels.instance }}

- name: monitoring-down
  rules:
  # Generic alert for any monitoring service that stops reporting
  # This works for both scraped and remote_write targets
  - alert: Monitoring_Service_Down
    expr: |
      (instance:up:last_seen{job=~"alloy|node-exporter|cadvisor"} == 1)
      unless
      (up{job=~"alloy|node-exporter|cadvisor"} == 1)
    for: 3m
    labels:
      severity: warning
    annotations:
      title: 'monitoring service {{ $labels.job }} is down in {{ $labels.instance }}'
      description: 'The {{ $labels.job }} service on {{ $labels.instance }} has stopped reporting metrics for more than 3 minutes.'

- name: risotto
  rules:
  - alert: Risotto_No_BGP_Peers
    expr: absent(risotto_peer_established)
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'risotto reports no BGP peers'

  - alert: Pipeline_BMP_No_Data
    expr: |
      (up{job="risotto"} == 1)
      and
      increase(risotto_kafka_messages_total{status="success"}[15m]) == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'BMP pipeline has produced no data for 15 minutes'
      description: 'Risotto is up but has sent 0 messages to Kafka in the last 15 minutes. The bmp.updates ClickHouse table is not receiving data.'

- name: pesto
  rules:
  - alert: Pipeline_SFlow_No_Data
    expr: |
      (up{job="pesto"} == 1)
      and
      increase(pesto_kafka_messages_total{status="success"}[15m]) == 0
    for: 1m
    labels:
      severity: critical
    annotations:
      title: 'sFlow pipeline has produced no data for 15 minutes'
      description: 'Pesto is up but has sent 0 messages to Kafka in the last 15 minutes. The flows.records ClickHouse table is not receiving data.'

- name: saimiris
  rules:
  - alert: Probing_Service_Saimiris_Down
    expr: |
      (instance:up:last_seen{job="saimiris"} == 1)
      unless
      (up{job="saimiris"} == 1)
    for: 3m
    labels:
      severity: warning
    annotations:
      title: 'probing service {{ $labels.job }} is down in {{ $labels.instance }}'
      description: 'The Saimiris probing service on {{ $labels.instance }} has stopped reporting metrics for more than 3 minutes.'

  - alert: Pipeline_Saimiris_Kafka_Broken
    # Fires when an agent is receiving probe replies but not forwarding to Kafka.
    # This catches the case where the pipeline is broken (e.g. Kafka unreachable)
    # without false-positiving when no experiments are actively running.
    expr: |
      increase(saimiris_receiver_received_total[2h]) > 100
      and
      increase(saimiris_kafka_messages_total{status="success"}[2h]) == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      title: 'Saimiris agent {{ $labels.instance }} is receiving replies but not sending to Kafka'
      description: 'Saimiris on {{ $labels.instance }} received probe replies but sent 0 messages to Kafka in the last 2 hours. The saimiris.replies ClickHouse table is not receiving data.'

- name: peerlab
  rules:
  - alert: Peerlab_Gateway_Down
    expr: |
      (instance:up:last_seen{job="peerlab-gateway"} == 1)
      unless
      (up{job="peerlab-gateway"} == 1)
    for: 3m
    labels:
      severity: warning
    annotations:
      title: 'peerlab gateway {{ $labels.job }} is down in {{ $labels.instance }}'
      description: 'The Peerlab Gateway service on {{ $labels.instance }} has stopped reporting metrics for more than 3 minutes.'
